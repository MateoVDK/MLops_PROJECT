displayName: blackjack-training
jobSpec:
  workerPoolSpecs:
    - machineSpec:
        machineType: n1-standard-4
      replicaCount: 1
      pythonPackageSpec:
        executorImageUri: us-docker.pkg.dev/vertex-ai/training/tf-cpu.2-12:latest
        packageUris:
          - gs://kenneth-vertex-bucket/packages/blackjack_trainer-0.1.tar.gz
        pythonModule: train
        args:
          - --output_path=gs://kenneth-vertex-bucket/policy/policy.pkl
