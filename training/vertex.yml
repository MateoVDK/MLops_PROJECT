displayName: blackjack-training
jobSpec:
  workerPoolSpecs:
    - machineSpec:
        machineType: n1-standard-4
      replicaCount: 1
      pythonPackageSpec:
        executorImageUri: us-docker.pkg.dev/vertex-ai/training/tf-cpu.2-12:latest
        packageUris:
          - gs://YOUR_BUCKET/packages/trainer.tar.gz
        pythonModule: training.train
        args:
          - --output_path=gs://YOUR_BUCKET/model/policy.pkl
