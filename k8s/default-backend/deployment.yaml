apiVersion: apps/v1
kind: Deployment
metadata:
  name: default-backend
  namespace: blackjack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: default-backend
  template:
    metadata:
      labels:
        app: default-backend
    spec:
      containers:
        - name: default-backend
          image: default-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
