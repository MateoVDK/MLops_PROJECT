apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: blackjack
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: europe-west4-docker.pkg.dev/sublime-lyceum-498409-j6/blackjack/blackjack-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
