<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack RL Advisor</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h1>♠ Blackjack RL Advisor ♠</h1>
        <p class="subtitle">
            Get AI recommendations for your next move.
        </p>

        <!-- TWO-COLUMN LAYOUT -->
        <div class="layout">

            <!-- LEFT SIDE: INPUTS -->
            <div class="card">

                <div class="input-group">
                    <label for="player-sum">Player Sum</label>
                    <input type="number" id="player-sum" placeholder="e.g. 16">
                </div>

                <div class="input-group">
                    <label for="dealer-card">Dealer Card</label>
                    <input type="number" id="dealer-card" placeholder="e.g. 10">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="usable-ace">
                    <label for="usable-ace">Usable Ace</label>
                </div>

                <button id="predict-btn">
                    Get Recommendation
                </button>

                <button id="premium-btn" class="premium-btn">
                    Buy Premium
                </button>

            </div>

            <!-- RIGHT SIDE: RESULTS -->
            <div class="right-column">
                <div class="result-card">
                    <h2>Recommendation</h2>
                    <div id="result">Waiting for input...</div>
                </div>

                <div class="confidence-card">
                    <h2>Confidence</h2>
                    <div class="confidence-bar-bg">
                        <div id="confidence-bar" class="confidence-bar-fill"></div>
                    </div>
                    <div id="confidence-label" class="confidence-label">0%</div>
                </div>

                <div class="explanation-card">
                    <h2>Explanation</h2>
                    <div id="explanation">
                        Premium feature — buy Premium to unlock detailed reasoning.
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="scripts/script.js"></script>

</body>
</html>
