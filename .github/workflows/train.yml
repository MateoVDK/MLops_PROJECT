name: Train Model

on:
  push:
    paths:
      - "training/**"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Submit Azure ML training job
        run: |
          az ml job create -f training/azureml_job.yml
