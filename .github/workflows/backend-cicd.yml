name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "k8s/**"
      - ".github/workflows/backend-cicd.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER || vars.GKE_CLUSTER }}
  GKE_LOCATION: ${{ vars.GKE_LOCATION || vars.GCP_REGION || 'europe-west1' }}
  ARTIFACT_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'blackjack' }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'blackjack' }}
  IMAGE_NAME: blackjack-api

jobs:
  build-push-deploy:
    name: Build, push and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set Docker image tags
        run: |
          set -euo pipefail
          IMAGE_BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${IMAGE_NAME}"
          echo "IMAGE_SHA=${IMAGE_BASE}:${GITHUB_SHA}" >> "${GITHUB_ENV}"
          echo "IMAGE_LATEST=${IMAGE_BASE}:latest" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_SHA }}
            ${{ env.IMAGE_LATEST }}

      - name: Get GKE credentials
        run: |
          set -euo pipefail
          if [ -z "${GKE_CLUSTER}" ]; then
            echo "Missing GitHub secret: GKE_CLUSTER"
            exit 1
          fi

          gcloud container clusters get-credentials "${GKE_CLUSTER}" \
            --location="${GKE_LOCATION}" \
            --project="${PROJECT_ID}"

      - name: Apply backend Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/api-service.yaml
          kubectl apply -f k8s/api-deployment.yaml

      - name: Update backend deployment image
        run: |
          set -euo pipefail
          kubectl set image deployment/api api="${IMAGE_SHA}" -n "${K8S_NAMESPACE}"
          kubectl rollout status deployment/api -n "${K8S_NAMESPACE}" --timeout=180s
